[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
runner = "qemu-system-x86_64 -drive format=raw,file=target/x86_64-unknown-none/debug/bootimage-cdk.bin"

[alias]
# Run host-side unit tests (bypasses the bare-metal default target).
# Usage:  cargo test-host
# Targets:
#   aarch64-apple-darwin     — Apple Silicon macOS  (current machine)
#   x86_64-apple-darwin      — Intel macOS
#   x86_64-unknown-linux-gnu — Linux x86_64
test-host = "test --target aarch64-apple-darwin --lib"
